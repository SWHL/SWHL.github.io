name: Documentation
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BLOG_MKDOCS_GIT_COMMITTERS_APIKEY: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install -r requirements.txt
      - run: |
          git fetch origin gh-pages --depth=1 || true
          mkdocs build
          ls -la site/
          mike deploy --push --update-aliases main latest
          mike set-default --push latest
          git fetch origin gh-pages --depth=1
          rm -rf /tmp/swhl-gh-pages
          git worktree add --detach /tmp/swhl-gh-pages origin/gh-pages
          cp site/robots.txt site/llms.txt site/llms-full.txt /tmp/swhl-gh-pages/
          git -C /tmp/swhl-gh-pages add robots.txt llms.txt llms-full.txt
          git -C /tmp/swhl-gh-pages diff --cached --quiet || git -C /tmp/swhl-gh-pages commit -m "Update root discovery files"
          git -C /tmp/swhl-gh-pages push origin HEAD:gh-pages
