{% if seo %}
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
  <link rel="alternate" type="text/markdown" href="{{ seo.markdown_url }}">
  <meta property="og:locale" content="zh_CN">
  <meta property="og:type" content="{{ 'article' if seo.is_article else 'website' }}">
  <meta property="og:site_name" content="{{ config.site_name }}">
  <meta property="og:title" content="{{ seo.full_title }}">
  <meta property="og:description" content="{{ seo.description }}">
  <meta property="og:url" content="{{ seo.canonical_url }}">
  {% if seo.image %}
    <meta property="og:image" content="{{ seo.image }}">
  {% endif %}
  {% if seo.is_article %}
    {% if seo.published_time %}
      <meta property="article:published_time" content="{{ seo.published_time }}">
    {% endif %}
    {% if seo.modified_time %}
      <meta property="article:modified_time" content="{{ seo.modified_time }}">
    {% endif %}
    <meta property="article:author" content="{{ seo.author }}">
  {% endif %}
  <meta name="twitter:card" content="{{ 'summary_large_image' if seo.image else 'summary' }}">
  {% if seo.twitter %}
    <meta name="twitter:site" content="{{ seo.twitter }}">
    <meta name="twitter:creator" content="{{ seo.twitter }}">
  {% endif %}
  <meta name="twitter:title" content="{{ seo.full_title }}">
  <meta name="twitter:description" content="{{ seo.description }}">
  <meta name="twitter:url" content="{{ seo.canonical_url }}">
  {% if seo.image %}
    <meta name="twitter:image" content="{{ seo.image }}">
  {% endif %}
  <script type="application/ld+json">
    {{ seo.schema_json | safe }}
  </script>
{% endif %}
